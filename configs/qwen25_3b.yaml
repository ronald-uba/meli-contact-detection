model:
  name: "Qwen/Qwen2.5-VL-3B-Instruct"
  load_in_4bit: false  # FP16 — bitsandbytes 4-bit tiene RecursionError con esta versión de Unsloth
  max_seq_length: 2048

peft:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.0
  bias: "none"
  target_modules: "all-linear"

training:
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  num_train_epochs: 3
  learning_rate: 2.0e-4
  fp16: false
  bf16: true   # A100/L4 native — más rápido y estable que fp16
  logging_steps: 2
  eval_strategy: "steps"
  eval_steps: 10
  save_steps: 10
  save_total_limit: 1
  report_to: "none"
  remove_unused_columns: false

data:
  max_images: 10
  img_max_side: 336
  prompt_max_chars: 2500
  seed: 42
